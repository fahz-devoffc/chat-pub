<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Encrypt</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#0f172a;
  color:white;
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar {
  width:260px;
  background:#020617;
  padding:15px;
  display:flex;
  flex-direction:column;
  transition:0.3s;
}

.sidebar.hide {
  transform:translateX(-100%);
  position:absolute;
  z-index:10;
}

/* TOP BAR */
.topbar {
  background:#020617;
  padding:10px;
  display:flex;
  align-items:center;
}

.menuBtn {
  font-size:20px;
  cursor:pointer;
  margin-right:10px;
}

/* USER */
.user {
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}
.user:hover { background:#1e293b; }

/* CHAT */
.chat {
  flex:1;
  display:flex;
  flex-direction:column;
}

.messages {
  flex:1;
  padding:15px;
  overflow:auto;
}

/* BUBBLE */
.msg {
  padding:10px 14px;
  border-radius:14px;
  margin:5px 0;
  max-width:70%;
}

.me {
  background:#38bdf8;
  color:black;
  margin-left:auto;
}

.other {
  background:#1e293b;
}

/* INPUT */
.inputBox {
  display:flex;
  padding:10px;
  background:#020617;
}

input {
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#0f172a;
  color:white;
}

button {
  margin-left:5px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
}

/* MOBILE */
@media(max-width:768px){
  .sidebar {
    position:absolute;
    height:100%;
  }
}
</style>
</head>

<body>

<div class="sidebar hide" id="sidebar">
  <h3>Chat</h3>

  <div onclick="setMode('normal')">💬 Chat</div>
  <div onclick="setMode('encrypt')">🔐 Encrypt</div>
  <div onclick="logout()">🚪 Logout</div>

  <hr>
  <div id="users"></div>
</div>

<div class="chat">
  <div class="topbar">
    <div class="menuBtn" onclick="toggleSidebar()">☰</div>
    <div id="header">Pilih user</div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="inputBox">
    <input id="msg" placeholder="Ketik pesan...">
    <button onclick="send()">➤</button>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBsjCVA17gsS4b8xKfbh42n_s7Y8m6aC_s",
  authDomain: "chat-encrypt-a922a.firebaseapp.com",
  databaseURL: "https://chat-encrypt-a922a-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let currentUser, currentChat, mode="normal";

// AUTH
auth.onAuthStateChanged(user=>{
  if(!user) return location.href="login.html";
  currentUser=user;
  loadUsers();
});

// SIDEBAR
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("hide");
}

// USERS
function loadUsers(){
  db.ref("users").on("child_added", snap=>{
    const u=snap.val();
    const uid=snap.key;

    if(uid===currentUser.uid) return;

    const div=document.createElement("div");
    div.className="user";
    div.innerText=u.username;

    div.onclick=()=>openChat(uid,u.username);

    users.appendChild(div);
  });
}

// CHAT
function getChatId(a,b){
  return mode+"_"+(a<b?a+"_"+b:b+"_"+a);
}

function openChat(uid,name){
  currentChat=getChatId(currentUser.uid,uid);
  header.innerText=name;

  messages.innerHTML="";
  db.ref("messages/"+currentChat).off();

  db.ref("messages/"+currentChat).on("child_added", snap=>{
    const m=snap.val();

    const div=document.createElement("div");
    div.className="msg "+(m.sender===currentUser.uid?"me":"other");
    div.innerText=m.text;

    messages.appendChild(div);
    messages.scrollTop=messages.scrollHeight;
  });
}

// SEND
function send(){
  const text=msg.value;
  if(!text||!currentChat) return;

  db.ref("messages/"+currentChat).push({
    sender:currentUser.uid,
    text,
    time:Date.now()
  });

  db.ref("logs").push({
    text:currentUser.uid+": "+text
  });

  msg.value="";
}

// MODE
function setMode(m){
  mode=m;
  alert("Mode: "+m);
}

// LOGOUT
function logout(){
  auth.signOut();
  localStorage.clear();
  location.href="login.html";
}
</script>

</body>
</html>
