<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Chat Encrypt</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#0f172a;
  color:white;
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar {
  width:260px;
  background:#020617;
  padding:20px;
  display:flex;
  flex-direction:column;
}

.logo {
  font-size:18px;
  font-weight:bold;
  margin-bottom:20px;
}

.menu {
  margin-bottom:10px;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}
.menu:hover {
  background:#1e293b;
}

.logout {
  margin-top:auto;
  background:#ef4444;
  text-align:center;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}

/* USER LIST */
.userList {
  margin-top:10px;
  overflow:auto;
}
.user {
  padding:10px;
  background:#0f172a;
  margin-top:5px;
  border-radius:8px;
  cursor:pointer;
}
.user:hover {
  background:#1e293b;
}

/* CHAT AREA */
.chat {
  flex:1;
  display:flex;
  flex-direction:column;
}

.header {
  background:#020617;
  padding:15px;
  font-weight:bold;
  border-bottom:1px solid #1e293b;
}

.messages {
  flex:1;
  padding:20px;
  overflow:auto;
  scroll-behavior:smooth;
}

/* CHAT BUBBLE */
.msg {
  margin:8px 0;
  padding:10px 14px;
  border-radius:14px;
  max-width:60%;
  word-wrap:break-word;
}

.me {
  background:#38bdf8;
  color:black;
  margin-left:auto;
}

.other {
  background:#1e293b;
}

/* INPUT */
.inputBox {
  display:flex;
  padding:10px;
  background:#020617;
  border-top:1px solid #1e293b;
}

.inputBox input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#0f172a;
  color:white;
}

.inputBox button {
  margin-left:8px;
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">💬 Chat Encrypt</div>

  <div class="menu" onclick="setMode('normal')">💬 Chat Biasa</div>
  <div class="menu" onclick="setMode('encrypt')">🔐 Chat Encrypt</div>
  <div class="menu" onclick="editProfile()">👤 Profile</div>
  <div class="menu" onclick="searchUser()">🔍 Search</div>

  <div class="userList" id="users"></div>

  <div class="logout" onclick="logout()">Logout</div>
</div>

<!-- CHAT -->
<div class="chat">
  <div class="header" id="header">Pilih user untuk chat</div>
  <div class="messages" id="messages"></div>

  <div class="inputBox">
    <input id="msg" placeholder="Ketik pesan...">
    <button onclick="send()">Kirim</button>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBsjCVA17gsS4b8xKfbh42n_s7Y8m6aC_s",
  authDomain: "chat-encrypt-a922a.firebaseapp.com",
  databaseURL: "https://chat-encrypt-a922a-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let currentUser, currentChat, mode="normal";

// AUTH
auth.onAuthStateChanged(user=>{
  if(!user){
    location.href="login.html";
  } else {
    currentUser = user;
    loadUsers();
  }
});

// LOAD USERS
function loadUsers(){
  db.ref("users").on("child_added", snap=>{
    const user = snap.val();
    const uid = snap.key;

    if(uid === currentUser.uid) return;

    const div = document.createElement("div");
    div.className="user";
    div.innerText=user.username;

    div.onclick=()=>openChat(uid,user.username);

    document.getElementById("users").appendChild(div);
  });
}

// MODE
function setMode(m){
  mode = m;
  alert("Mode: " + (m==="encrypt"?"Chat Encrypt 🔐":"Chat Biasa"));
}

// CHAT ID
function getChatId(a,b){
  return mode+"_"+(a<b?a+"_"+b:b+"_"+a);
}

// OPEN CHAT
function openChat(uid,name){
  currentChat = getChatId(currentUser.uid, uid);

  document.getElementById("header").innerText =
    name + (mode==="encrypt"?" 🔐":"");

  document.getElementById("messages").innerHTML="";

  db.ref("messages/"+currentChat).off();

  db.ref("messages/"+currentChat).on("child_added", snap=>{
    const m = snap.val();

    const div = document.createElement("div");
    div.className="msg "+(m.sender===currentUser.uid?"me":"other");
    div.innerText = m.text;

    document.getElementById("messages").appendChild(div);
  });
}

// SEND
function send(){
  const text = document.getElementById("msg").value;
  if(!text || !currentChat) return;

  db.ref("messages/"+currentChat).push({
    sender: currentUser.uid,
    text,
    time: Date.now(),
    mode
  });

  db.ref("logs").push({
    text: currentUser.uid+" ("+mode+"): "+text
  });

  document.getElementById("msg").value="";
}

// PROFILE
function editProfile(){
  const name = prompt("Username baru:");
  const bio = prompt("Bio:");
  const photo = prompt("Foto URL:");

  db.ref("users/"+currentUser.uid).update({
    username:name,
    bio,
    photo
  });

  alert("Profile updated!");
}

// SEARCH
function searchUser(){
  const key = prompt("Cari username:");

  db.ref("users").once("value", snap=>{
    snap.forEach(s=>{
      if(s.val().username.includes(key)){
        alert("Ditemukan: "+s.val().username);
      }
    });
  });
}

// LOGOUT
function logout(){
  auth.signOut().then(()=>{
    localStorage.clear();
    location.href="login.html";
  });
}
</script>

</body>
</html>
