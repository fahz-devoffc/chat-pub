<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LisaChat™ - Login/Signup</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background particles */
        .particle {
            position: fixed;
            width: 3px;
            height: 3px;
            background: rgba(255, 100, 150, 0.5);
            border-radius: 50%;
            pointer-events: none;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        .container {
            background: rgba(20, 20, 35, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 40px 32px;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 100, 150, 0.2);
            animation: slideUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 2;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo i {
            font-size: 48px;
            color: #ff6b9d;
            text-shadow: 0 0 20px rgba(255, 107, 157, 0.5);
        }

        .logo h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #ff6b9d, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-top: 12px;
            letter-spacing: -0.5px;
        }

        .logo p {
            color: #888;
            font-size: 13px;
            margin-top: 6px;
        }

        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 60px;
            padding: 4px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #aaa;
            font-size: 16px;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #ff6b9d, #c084fc);
            color: white;
            box-shadow: 0 4px 12px rgba(255, 107, 157, 0.3);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ddd;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #ff6b9d;
            font-size: 16px;
        }

        input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: rgba(10, 10, 20, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 60px;
            color: white;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #ff6b9d;
            background: rgba(20, 20, 40, 0.8);
            box-shadow: 0 0 0 3px rgba(255, 107, 157, 0.1);
        }

        input::placeholder {
            color: #555;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff6b9d, #c084fc);
            border: none;
            border-radius: 60px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            margin-top: 12px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 157, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
            padding: 12px 24px;
            border-radius: 60px;
            color: white;
            font-size: 14px;
            z-index: 1000;
            transition: transform 0.3s ease;
            border-left: 3px solid #ff6b9d;
            max-width: 90%;
            text-align: center;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.error {
            border-left-color: #ff4444;
        }

        .toast.success {
            border-left-color: #44ff44;
        }

        .alert-text {
            display: none;
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid rgba(255, 68, 68, 0.5);
            border-radius: 12px;
            padding: 10px;
            margin-top: 12px;
            color: #ff8888;
            font-size: 12px;
            text-align: center;
        }

        @media (max-width: 520px) {
            .container {
                padding: 28px 20px;
                width: 92%;
            }
            .logo h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <i class="fas fa-shield-halts"></i>
            <h1>LisaEncrypt Chat</h1>
            <p>Secure • Real-time • Anonymous</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="loginTabBtn">Login</button>
            <button class="tab-btn" id="signupTabBtn">Sign Up</button>
        </div>

        <!-- Login Form -->
        <div id="loginForm">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
                </div>
            </div>
            <button class="btn-primary" id="loginBtn">
                <i class="fas fa-arrow-right-to-bracket"></i> Login
            </button>
        </div>

        <!-- Signup Form (hidden by default) -->
        <div id="signupForm" style="display: none;">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Username</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="signupUsername" placeholder="CoolName123" autocomplete="off">
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="off">
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="signupPassword" placeholder="minimal 6 karakter" autocomplete="new-password">
                </div>
            </div>
            <button class="btn-primary" id="signupBtn">
                <i class="fas fa-user-plus"></i> Sign Up
            </button>
        </div>

        <div id="alertMessage" class="alert-text"></div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // Konfigurasi Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBsjCVA17gsS4b8xKfbh42n_s7Y8m6aC_s",
            authDomain: "chat-encrypt-a922a.firebaseapp.com",
            databaseURL: "https://chat-encrypt-a922a-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "chat-encrypt-a922a",
            storageBucket: "chat-encrypt-a922a.firebasestorage.app",
            messagingSenderId: "311419431284",
            appId: "1:311419431284:web:ad4edac6194bb2f4522421",
            measurementId: "G-QEGFY3X91T"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // DOM Elements
        const loginFormDiv = document.getElementById('loginForm');
        const signupFormDiv = document.getElementById('signupForm');
        const loginTab = document.getElementById('loginTabBtn');
        const signupTab = document.getElementById('signupTabBtn');
        const loginBtn = document.getElementById('loginBtn');
        const signupBtn = document.getElementById('signupBtn');
        const toastEl = document.getElementById('toast');

        // Particle background
        function createParticles() {
            for (let i = 0; i < 60; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = 15 + Math.random() * 15 + 's';
                particle.style.width = particle.style.height = (2 + Math.random() * 4) + 'px';
                particle.style.opacity = 0.3 + Math.random() * 0.5;
                document.body.appendChild(particle);
            }
        }
        createParticles();

        function showToast(message, type = 'info') {
            toastEl.textContent = message;
            toastEl.className = `toast ${type} show`;
            setTimeout(() => {
                toastEl.classList.remove('show');
            }, 3000);
        }

        // Tab switching
        loginTab.addEventListener('click', () => {
            loginTab.classList.add('active');
            signupTab.classList.remove('active');
            loginFormDiv.style.display = 'block';
            signupFormDiv.style.display = 'none';
            document.getElementById('alertMessage').style.display = 'none';
        });

        signupTab.addEventListener('click', () => {
            signupTab.classList.add('active');
            loginTab.classList.remove('active');
            loginFormDiv.style.display = 'none';
            signupFormDiv.style.display = 'block';
            document.getElementById('alertMessage').style.display = 'none';
        });

        // Cek apakah user sudah login
        auth.onAuthStateChanged((user) => {
            if (user) {
                // Cek apakah user di-banned
                const userId = user.uid;
                database.ref('users/' + userId + '/banned').once('value').then((snapshot) => {
                    if (snapshot.val() === true) {
                        showToast('Akun Anda telah diblokir oleh admin', 'error');
                        auth.signOut();
                    } else {
                        window.location.href = 'index.html';
                    }
                }).catch(() => {
                    window.location.href = 'index.html';
                });
            }
        });

        // SIGNUP dengan cek duplicate username dan pending approval
        signupBtn.addEventListener('click', async () => {
            const username = document.getElementById('signupUsername').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;

            if (!username || !email || !password) {
                showToast('Semua field harus diisi!', 'error');
                return;
            }

            if (username.length < 3) {
                showToast('Username minimal 3 karakter', 'error');
                return;
            }

            if (password.length < 6) {
                showToast('Password minimal 6 karakter', 'error');
                return;
            }

            // CEK apakah username sudah terdaftar (cegah duplicate)
            const usernameCheck = await database.ref('usernames/' + username).once('value');
            if (usernameCheck.exists()) {
                showToast('Username sudah digunakan!', 'error');
                return;
            }

            // CEK apakah email sudah pernah signup (lebih dari 1x attempt)
            // Kita cek di node 'pendingRequests' atau 'users' berdasarkan email
            const emailCheck = await database.ref('pendingRequests').orderByChild('email').equalTo(email).once('value');
            const userCheck = await database.ref('users').orderByChild('email').equalTo(email).once('value');
            
            if (emailCheck.exists() || userCheck.exists()) {
                // Kirim notifikasi ke admin (via realtime) dan tampilkan toast
                const requestRef = database.ref('adminAlerts').push();
                requestRef.set({
                    type: 'DUPLICATE_ATTEMPT',
                    email: email,
                    username: username,
                    timestamp: Date.now(),
                    message: 'User mencoba signup lebih dari 1x dengan email yang sama'
                });
                showToast('⚠️ Lebih dari 1x percobaan! Sistem auto request ke admin', 'error');
                
                // Tampilkan alert khusus
                const alertDiv = document.getElementById('alertMessage');
                alertDiv.style.display = 'block';
                alertDiv.innerHTML = '⚠️ Email ini sudah pernah digunakan untuk signup sebelumnya. <br> Request telah dikirim ke admin untuk ditinjau.';
                setTimeout(() => {
                    alertDiv.style.display = 'none';
                }, 5000);
                return;
            }

            // Buat user di Firebase Auth
            try {
                const userCred = await auth.createUserWithEmailAndPassword(email, password);
                const userId = userCred.user.uid;

                // Simpan ke pendingRequests dulu (menunggu approval admin)
                await database.ref('pendingRequests/' + userId).set({
                    uid: userId,
                    username: username,
                    email: email,
                    status: 'pending', // pending | approved | rejected
                    timestamp: Date.now()
                });

                // Simpan username mapping sementara (tapi pending)
                await database.ref('tempUsernames/' + username).set(userId);

                showToast('✅ Pendaftaran berhasil! Menunggu persetujuan admin...', 'success');
                
                // Sign out dulu karena belum approved
                await auth.signOut();
                
                // Reset form
                document.getElementById('signupUsername').value = '';
                document.getElementById('signupEmail').value = '';
                document.getElementById('signupPassword').value = '';
                
                // Pindah ke tab login
                loginTab.click();
                showToast('Akun Anda perlu disetujui admin terlebih dahulu', 'info');
                
            } catch (error) {
                console.error(error);
                showToast(error.message, 'error');
            }
        });

        // LOGIN
        loginBtn.addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showToast('Isi email dan password!', 'error');
                return;
            }

            try {
                const userCred = await auth.signInWithEmailAndPassword(email, password);
                const userId = userCred.user.uid;
                
                // Cek apakah user sudah approved (tidak ada di pendingRequests)
                const pendingCheck = await database.ref('pendingRequests/' + userId).once('value');
                if (pendingCheck.exists() && pendingCheck.val().status === 'pending') {
                    showToast('Akun Anda belum disetujui admin', 'error');
                    await auth.signOut();
                    return;
                }
                
                // Cek banned
                const banCheck = await database.ref('users/' + userId + '/banned').once('value');
                if (banCheck.val() === true) {
                    showToast('Akun Anda telah diblokir', 'error');
                    await auth.signOut();
                    return;
                }
                
                // Jika sudah approved, pindah ke index
                window.location.href = 'index.html';
                
            } catch (error) {
                console.error(error);
                showToast('Login gagal: ' + error.message, 'error');
            }
        });

        // Enter key support
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    if (loginFormDiv.style.display !== 'none') {
                        loginBtn.click();
                    } else {
                        signupBtn.click();
                    }
                }
            });
        });
    </script>
</body>
</html>
