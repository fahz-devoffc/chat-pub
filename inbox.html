<!DOCTYPE html>
<html>
<head>
<title>Inbox Admin</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
</head>

<body>
<h2>Request User</h2>
<div id="list"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBsjCVA17gsS4b8xKfbh42n_s7Y8m6aC_s",
  databaseURL: "https://chat-encrypt-a922a-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

db.ref("requests").on("child_added", snap=>{
  const d=snap.val();
  const id=snap.key;

  const div=document.createElement("div");

  div.innerHTML=`
    <p>${d.email} (${d.username})</p>
    <button onclick="approve('${id}','${d.email}','${d.username}')">Izinkan</button>
    <button onclick="reject('${id}')">Tolak</button>
    <hr>
  `;

  list.appendChild(div);
});

// APPROVE
function approve(id,email,username){

  // buat user dummy entry (izin manual)
  const uid="approved_"+Date.now();

  db.ref("users/"+uid).set({
    email,
    username,
    approved:true,
    createdAt:Date.now()
  });

  db.ref("requests/"+id).remove();

  alert("User diizinkan!");
}

// REJECT
function reject(id){
  db.ref("requests/"+id).remove();
  alert("Ditolak!");
}
</script>

</body>
</html>
